<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COFFETERA</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
    }

    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: url('WALLPAPER.png') no-repeat center/cover;
    }

    /* overlay gradasi transparan */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, rgba(255,122,24,0.25), rgba(255,255,255,0.15));
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      padding: 20px;
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(60px, 12vw, 140px);
      letter-spacing: 12px;
      color: transparent;
      -webkit-text-stroke: 2px #ffffff;
      text-transform: uppercase;
      text-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .subtitle {
      margin-top: 20px;
      font-size: clamp(14px, 3vw, 22px);
      color: #ffffff;
      font-weight: 300;
      letter-spacing: 2px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    /* wave effect bawah */
    .wave {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 200px;
      z-index: 2;
      line-height: 0;
    }

    .wave svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    @media (max-width: 600px) {
      .wave {
        height: 160px;
      }
    }
  </style>
</head>

<body>
  <section class="hero">
    <div class="overlay"></div>

    <div class="content">
      <div class="title">COFFETERA</div>
      <div class="subtitle">Find Your Perfect Coffee Spot</div>
    </div>

    <!-- wave bawah full & bertumpuk -->
    <div class="wave">
      <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
        <path fill="#ffffff" fill-opacity="0.9" d="M0,160L60,165.3C120,171,240,181,360,176C480,171,600,149,720,149.3C840,149,960,171,1080,181.3C1200,192,1320,192,1380,192L1440,192L1440,320L0,320Z"></path>
        <path fill="#ffffff" fill-opacity="0.6" d="M0,200L60,208C120,216,240,232,360,224C480,216,600,184,720,181.3C840,179,960,203,1080,213.3C1200,224,1320,224,1380,224L1440,224L1440,320L0,320Z"></path>
        <path fill="#ffffff" fill-opacity="0.4" d="M0,240L60,250.7C120,261,240,283,360,266.7C480,251,600,197,720,186.7C840,176,960,208,1080,224C1200,240,1320,240,1380,240L1440,240L1440,320L0,320Z"></path>
      </svg>
    </div>
    </div>

  </section>
</body>
</html>
