<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COFFETERA</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;500&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Montserrat',sans-serif}

    /* HERO */
    .hero{
      position:relative;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      background:url('WALLPAPER.png') no-repeat center/cover;
    }

    .overlay{
      position:absolute;
      width:100%;height:100%;
      background:linear-gradient(to bottom,rgba(255,122,24,0.25),rgba(255,255,255,0.15));
    }

    .content{position:relative;z-index:2}

    .title{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(60px,12vw,140px);
      letter-spacing:12px;
      color:transparent;
      -webkit-text-stroke:2px #fff;
      text-shadow:0 4px 20px rgba(0,0,0,0.3);
    }

    .subtitle{
      margin-top:20px;
      font-size:clamp(14px,3vw,22px);
      color:#ffffff;
      font-weight:300;
      letter-spacing:2px;
      text-shadow:0 2px 10px rgba(0,0,0,0.3);
      font-family:'Montserrat', sans-serif;
    }

    .wave{position:absolute;bottom:0;width:100%;height:200px}
    .wave svg{width:100%;height:100%}

    /* NEXT SECTION */
    .next-section{
      min-height:100vh;
      background:#fff;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      align-items:center;
      padding:20px 20px 60px;
      gap:40px;
    }

    .charts{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:40px;
      width:100%;
      max-width:1200px;
      opacity:0;
      transform:translateY(50px);
      transition:0.8s;
    }

    .charts.show{
      opacity:1;
      transform:translateY(0);
    }

    .card{
      background:#f9f9f9;
      padding:25px;
      border-radius:18px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
      transition:all 0.35s ease;
      cursor:pointer;
    }

    /* HOVER POP-UP EFFECT */
    .card:hover{
      transform:translateY(-12px) scale(1.05);
      box-shadow:0 20px 50px rgba(0,0,0,0.2);
    }

    .donut{
      width:140px;
      height:140px;
      border-radius:50%;
      margin:0 auto 15px;
      position:relative;
    }

    .donut::after{
      content:'';
      position:absolute;
      top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:80px;height:80px;
      background:#fff;
      border-radius:50%;
    }

    .value{
      position:absolute;
      top:50%;left:50%;
      transform:translate(-50%,-50%);
      font-weight:bold;
      color:#ff7a18;
      z-index:2;
      font-size:20px;
    }

    /* DONUT COLORS */
    .aesthetic{background:conic-gradient(#ff7a18 0% 80%, #eee 80%)}
    .cowork{background:conic-gradient(#ff7a18 0% 70%, #eee 70%)}
    .family{background:conic-gradient(#ff7a18 0% 60%, #eee 60%)}
    .romantic{background:conic-gradient(#ff7a18 0% 50%, #eee 50%)}

    /* TITLE STYLE (lebih aesthetic) */
    .card p{
      font-family:'Montserrat', sans-serif;
      font-size:16px;
      margin-top:10px;
      color:#333;
      letter-spacing:2px;
      font-weight:400;
    }

    .section-title{
      font-family:'Bebas Neue', sans-serif;
      font-size:clamp(40px,6vw,80px);
      color:#ff7a18;
      letter-spacing:8px;
      text-align:center;
    }

    @media(max-width:600px){
      .wave{height:150px}
    }
  </style>
</head>

<body>

<section class="hero">
  <div class="overlay"></div>
  <div class="content">
    <div class="title">COFFETERA</div>
    <div class="subtitle">Find Your Perfect Coffee Spot</div>
  </div>

  <div class="wave">
    <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
      <path fill="#fff" fill-opacity="0.9" d="M0,160L60,165.3C120,171,240,181,360,176C480,171,600,149,720,149.3C840,149,960,171,1080,181.3C1200,192,1320,192,1380,192L1440,192L1440,320L0,320Z"></path>
      <path fill="#fff" fill-opacity="0.6" d="M0,200L60,208C120,216,240,232,360,224C480,216,600,184,720,181.3C840,179,960,203,1080,213.3C1200,224,1320,224,1380,224L1440,224L1440,320L0,320Z"></path>
    </svg>
  </div>
</section>

<section class="next-section">
  <div class="section-title">COFFEE INSIGHT</div>
  <div class="charts" id="charts">

    <div class="card">
      <div class="donut aesthetic">
        <div class="value">80%</div>
      </div>
      <p>Aesthetic Coffee</p>
    </div>

    <div class="card">
      <div class="donut cowork">
        <div class="value">70%</div>
      </div>
      <p>Co-Working Coffee</p>
    </div>

    <div class="card">
      <div class="donut family">
        <div class="value">60%</div>
      </div>
      <p>Family Coffee</p>
    </div>

    <div class="card">
      <div class="donut romantic">
        <div class="value">50%</div>
      </div>
      <p>Romantic Coffee</p>
    </div>

  </div>
</section>

<script>
const charts = document.getElementById('charts');

const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      charts.classList.add('show');
    }
  })
},{threshold:0.3});

observer.observe(charts);
</script>

</body>
</html>
